<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>IRON LEGION — Robot Command</title>
<link rel="icon" href="https://vibekit.bot/public/favicon.ico" sizes="any">
<style>
:root{
  --bg:#07070c; --bg2:#0d0d16; --card:#12121c; --card2:#181824; --border:#26263a;
  --fg:#f2f2f7; --mute:#8a8aa0; --accent:#7c5cff; --accent2:#00e5c7;
  --common:#8a8aa0; --uncommon:#3ecf6e; --rare:#3ea8ff; --epic:#c04eff; --legendary:#ffb020;
  --hp:#ff4d5e; --danger:#ff4d5e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:radial-gradient(ellipse at top,#181430 0%,var(--bg) 55%);
  color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  overflow:hidden;user-select:none;
}
#app{position:fixed;inset:0;display:flex;flex-direction:column}

/* topbar */
#topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(10,10,16,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);z-index:20}
.brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:.04em}
.brand-mark{width:26px;height:26px;flex:none;object-fit:contain;border-radius:6px}
.brand-text{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600;white-space:nowrap}
.pill .ico{font-size:14px}
#credits{color:var(--legendary)}
.spacer{flex:1}
#winrate{color:var(--mute);font-size:12px;font-weight:500}

/* main stage */
#stage{flex:1;position:relative;min-height:0}
#viewer{position:absolute;inset:0}
#viewer canvas{display:block;width:100%;height:100%;touch-action:none}
#viewerOverlay{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:flex-end}
.hud-top{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
.robot-tag{pointer-events:auto}
.rarity-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.robot-name{font-size:22px;font-weight:800;letter-spacing:-.01em;margin-top:6px;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.robot-class{font-size:12px;color:var(--mute);font-weight:600;text-transform:uppercase;letter-spacing:.05em}

.statbar-wrap{pointer-events:auto;background:linear-gradient(180deg,transparent,rgba(7,7,12,.92) 40%);padding:16px 14px calc(14px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:8px}
.statrow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mute);font-weight:700}
.statrow .label{width:34px}
.statrow .bar{flex:1;height:6px;background:#20202e;border-radius:4px;overflow:hidden}
.statrow .bar i{display:block;height:100%;border-radius:4px}
.statrow .val{width:30px;text-align:right;color:var(--fg)}

/* nav */
#nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);z-index:20}
.navbtn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--mute);font-size:10.5px;font-weight:700;letter-spacing:.02em}
.navbtn .ic{font-size:19px}
.navbtn.active{color:var(--fg)}
.navbtn.active .ic{filter:drop-shadow(0 0 8px var(--accent))}

/* panels (slide up sheets) */
.panel{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:15;overflow:hidden}
.panel.open{display:flex}
.panel-head{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--border)}
.panel-head h2{font-size:17px;font-weight:800}
.panel-body{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.closeBtn{margin-left:auto;background:var(--card);border:1px solid var(--border);color:var(--fg);width:30px;height:30px;border-radius:8px;font-size:16px}

/* collection grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px;text-align:center;position:relative}
.rcard.locked{opacity:.45}
.rcard .swatch{width:100%;aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:6px}
.rcard .nm{font-size:11px;font-weight:700;line-height:1.2}
.rcard .rr{font-size:9px;color:var(--mute);font-weight:700;text-transform:uppercase}
.rcard .lockicon{position:absolute;top:6px;right:6px;font-size:12px}
.rcard.selected{outline:2px solid var(--accent2)}

/* weapon list */
.wlist{display:flex;flex-direction:column;gap:10px}
.witem{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;gap:12px;align-items:center}
.wicon{width:46px;height:46px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.wbody{flex:1;min-width:0}
.wname{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
.wmeta{font-size:11px;color:var(--mute);margin-top:2px}
.wactions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;white-space:nowrap}
.btn.secondary{background:var(--card2);color:var(--fg);border:1px solid var(--border)}
.btn.equipped{background:var(--accent2);color:#052018}
.btn:disabled{opacity:.4}
.lvltag{font-size:10px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:2px 6px;font-weight:700;color:var(--accent2)}

/* battle */
.arena{display:flex;flex-direction:column;height:100%}
.fighters{display:flex;padding:14px;gap:10px;align-items:stretch}
.fighter{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px}
.fighter .fname{font-weight:800;font-size:13px}
.fighter .fclass{font-size:10px;color:var(--mute);text-transform:uppercase;font-weight:700}
.hpbar{margin-top:8px;height:10px;background:#20202e;border-radius:5px;overflow:hidden}
.hpbar i{display:block;height:100%;background:linear-gradient(90deg,#ff4d5e,#ff8a5e);transition:width .35s ease}
.hpbar.good i{background:linear-gradient(90deg,#3ecf6e,#00e5c7)}
.vs{display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--mute);font-size:13px}
.log{flex:1;overflow-y:auto;padding:0 14px;font-size:12.5px;color:var(--mute);display:flex;flex-direction:column-reverse;gap:4px}
.log .me{color:var(--accent2)}
.log .en{color:var(--hp)}
.log .sys{color:var(--legendary);font-weight:700}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px calc(14px + env(safe-area-inset-bottom))}
.actbtn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--fg)}
.actbtn .ic{font-size:20px}
.actbtn .lb{font-size:11px;font-weight:700}
.actbtn .cd{font-size:9px;color:var(--mute)}
.actbtn:disabled{opacity:.35}
.result-overlay{position:absolute;inset:0;background:rgba(6,6,10,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:30;text-align:center;padding:24px}
.result-overlay.show{display:flex}
.result-overlay h1{font-size:34px;font-weight:900}
.result-overlay.win h1{color:var(--legendary)}
.result-overlay.lose h1{color:var(--danger)}
.result-overlay p{color:var(--mute);font-size:14px}

/* toast */
#toast{position:fixed;left:50%;top:70px;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;z-index:100;opacity:0;transition:opacity .25s ease,transform .25s ease;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(6px)}

/* hangar detail bottom sheet */
.detail-sheet{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,transparent,rgba(7,7,12,.97) 18%);pointer-events:none}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="brand">
      <img class="brand-mark" src="/images/iron-legion-logo.png" alt="Iron Legion"/>
      <span class="brand-text">IRON LEGION</span>
    </span>
    <div class="spacer"></div>
    <div class="pill" id="creditsPill"><span class="ico">◆</span><span id="credits">0</span></div>
    <div class="pill"><span class="ico">🏆</span><span id="winrate">0W</span></div>
  </div>

  <div id="stage">
    <div id="viewer"></div>
    <div id="viewerOverlay">
      <div class="hud-top">
        <div class="robot-tag">
          <span class="rarity-badge" id="rarityBadge">COMMON</span>
          <div class="robot-name" id="robotName">—</div>
          <div class="robot-class" id="robotClass">—</div>
        </div>
      </div>
      <div class="statbar-wrap" id="hangarStats"></div>
    </div>
  </div>

  <div id="nav">
    <button class="navbtn active" data-panel="hangar"><span class="ic">🤖</span>HANGAR</button>
    <button class="navbtn" data-panel="collection"><span class="ic">🗂</span>ROBOTS</button>
    <button class="navbtn" data-panel="weapons"><span class="ic">⚔</span>WEAPONS</button>
    <button class="navbtn" data-panel="battle"><span class="ic">💥</span>BATTLE</button>
  </div>

  <!-- COLLECTION PANEL -->
  <div class="panel" id="panel-collection">
    <div class="panel-head"><h2>Robot Collection</h2><button class="closeBtn" data-close>✕</button></div>
    <div class="panel-body">
      <button class="btn" id="recruitBtn" style="width:100%;padding:12px;margin-bottom:14px;font-size:14px">Recruit Robot — ◆ 350</button>
      <div class="grid" id="collectionGrid"></div>
    </div>
  </div>

  <!-- WEAPONS PANEL -->
  <div class="panel" id="panel-weapons">
    <div class="panel-head"><h2>Weapon Bay</h2><button class="closeBtn" data-close>✕</button></div>
    <div class="panel-body"><div class="wlist" id="weaponList"></div></div>
  </div>

  <!-- BATTLE PANEL -->
  <div class="panel" id="panel-battle">
    <div class="panel-head"><h2>Combat Arena</h2><button class="closeBtn" data-close>✕</button></div>
    <div class="arena">
      <div class="fighters">
        <div class="fighter" id="pFighter">
          <div class="fname" id="pName">—</div>
          <div class="fclass" id="pClass">—</div>
          <div class="hpbar good"><i id="pHpBar" style="width:100%"></i></div>
        </div>
        <div class="vs">VS</div>
        <div class="fighter" id="eFighter">
          <div class="fname" id="eName">—</div>
          <div class="fclass" id="eClass">—</div>
          <div class="hpbar"><i id="eHpBar" style="width:100%"></i></div>
        </div>
      </div>
      <div class="log" id="battleLog"></div>
      <div class="actions">
        <button class="actbtn" id="actAttack"><span class="ic">🗡</span><span class="lb">Attack</span></button>
        <button class="actbtn" id="actAbility"><span class="ic">✨</span><span class="lb" id="abilityLbl">Ability</span><span class="cd" id="abilityCd"></span></button>
        <button class="actbtn" id="actDefend"><span class="ic">🛡</span><span class="lb">Defend</span></button>
      </div>
    </div>
    <div class="result-overlay" id="resultOverlay">
      <h1 id="resultTitle">VICTORY</h1>
      <p id="resultDesc">You earned ◆120</p>
      <button class="btn" id="resultClose" style="padding:12px 28px;font-size:14px">Continue</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============ DATA ============ */
const RARITY = {
  common:    { label:'Common',    color:'#8a8aa0', mult:1.0,  cost:0 },
  uncommon:  { label:'Uncommon',  color:'#3ecf6e', mult:1.25, cost:500 },
  rare:      { label:'Rare',      color:'#3ea8ff', mult:1.55, cost:1400 },
  epic:      { label:'Epic',      color:'#c04eff', mult:1.95, cost:3200 },
  legendary: { label:'Legendary', color:'#ffb020', mult:2.5,  cost:6000 },
};
const RARITY_WEIGHTS = { common:40, uncommon:28, rare:18, epic:10, legendary:4 };

// class => shape archetype + base stat lean
const CLASSES = {
  assault: { label:'Assault', lean:{hp:1.0,atk:1.15,def:0.95,spd:1.0} },
  tank:    { label:'Tank',    lean:{hp:1.45,atk:0.8, def:1.4, spd:0.65} },
  sniper:  { label:'Sniper',  lean:{hp:0.75,atk:1.4, def:0.7, spd:1.1} },
  scout:   { label:'Scout',   lean:{hp:0.8, atk:0.95,def:0.75,spd:1.55} },
  support: { label:'Support', lean:{hp:1.05,atk:0.85,def:1.05,spd:0.95} },
};

const ABILITIES = [
  { id:'overcharge', name:'Overcharge', desc:'+60% attack for 2 turns', cd:3 },
  { id:'aegis', name:'Aegis Shield', desc:'Block 70% damage next turn', cd:3 },
  { id:'nanoheal', name:'Nano Repair', desc:'Restore 25% max HP', cd:4 },
  { id:'emp', name:'EMP Burst', desc:'Stun enemy, skip their turn', cd:4 },
  { id:'focus', name:'Focus Fire', desc:'Guaranteed critical hit', cd:3 },
  { id:'siphon', name:'Siphon', desc:'Drain 20% dealt dmg as HP', cd:3 },
];

// 20 robots: id, name, class, rarity, ability, color(accent)
const ROBOTS = [
  {id:'r1',  name:'Scrapper',    class:'assault', rarity:'common',    ability:'overcharge', color:0x9aa0ac},
  {id:'r2',  name:'Rustbolt',    class:'tank',     rarity:'common',    ability:'aegis',      color:0x8a7860},
  {id:'r3',  name:'Sentry-7',    class:'sniper',   rarity:'common',    ability:'focus',      color:0x6c8c9c},
  {id:'r4',  name:'Skitterbot',  class:'scout',    rarity:'common',    ability:'siphon',     color:0x77aa77},
  {id:'r5',  name:'Medico-1',    class:'support',  rarity:'common',    ability:'nanoheal',   color:0xa0a0d0},
  {id:'r6',  name:'Wardog',      class:'assault',  rarity:'uncommon',  ability:'overcharge', color:0x556b8f},
  {id:'r7',  name:'Ironclad',    class:'tank',     rarity:'uncommon',  ability:'aegis',      color:0x707880},
  {id:'r8',  name:'Vantage',     class:'sniper',   rarity:'uncommon',  ability:'focus',      color:0x3f6f9c},
  {id:'r9',  name:'Zephyrun',    class:'scout',    rarity:'uncommon',  ability:'siphon',     color:0x4fae8f},
  {id:'r10', name:'Circuit-Sage',class:'support',  rarity:'uncommon',  ability:'nanoheal',   color:0x8a5fd6},
  {id:'r11', name:'Nightshade',  class:'assault',  rarity:'rare',      ability:'emp',        color:0x2e2e46},
  {id:'r12', name:'Grimlock',    class:'tank',     rarity:'rare',      ability:'aegis',      color:0x4a4a5a},
  {id:'r13', name:'Pulsar',      class:'sniper',   rarity:'rare',      ability:'focus',      color:0x2c7bd0},
  {id:'r14', name:'Vortex',      class:'scout',    rarity:'rare',      ability:'siphon',     color:0x18b598},
  {id:'r15', name:'Aegis Prime', class:'support',  rarity:'rare',      ability:'nanoheal',   color:0x6f42c1},
  {id:'r16', name:'Reaper-X',    class:'assault',  rarity:'epic',      ability:'emp',        color:0x7a1030},
  {id:'r17', name:'Titanfall',   class:'tank',     rarity:'epic',      ability:'aegis',      color:0x3a3a52},
  {id:'r18', name:'Specter',     class:'scout',    rarity:'epic',      ability:'emp',        color:0x9c2ee0},
  {id:'r19', name:'Obsidian',    class:'assault',  rarity:'legendary', ability:'overcharge', color:0x121218},
  {id:'r20', name:'Chronos',     class:'tank',     rarity:'legendary', ability:'emp',        color:0xd4af37},
];

// Weapons: base stats + shape for 3D attachment
const WEAPONS = [
  {id:'w1', name:'Scrap Blade',    ic:'🗡',  shape:'blade',    baseAtk:6,  crit:0.18, cost:0,    special:null},
  {id:'w2', name:'Pulse Pistol',   ic:'🔫',  shape:'pistol',   baseAtk:8,  crit:0.10, cost:400,  special:null},
  {id:'w3', name:'Rail Cannon',    ic:'📡',  shape:'cannon',   baseAtk:16, crit:0.08, cost:1200, special:'pierce'},
  {id:'w4', name:'Twin SMGs',      ic:'🔥',  shape:'smg',      baseAtk:5,  crit:0.30, cost:1200, special:'multi'},
  {id:'w5', name:'Plasma Lance',   ic:'⚡',  shape:'lance',    baseAtk:14, crit:0.12, cost:2200, special:'pierce'},
  {id:'w6', name:'Shock Hammer',   ic:'🔨',  shape:'hammer',   baseAtk:12, crit:0.10, cost:2200, special:'stun'},
  {id:'w7', name:'Arc Disruptor',  ic:'🌀',  shape:'orb',      baseAtk:10, crit:0.14, cost:3400, special:'shred'},
  {id:'w8', name:'Void Ripper',    ic:'☄',  shape:'greatblade',baseAtk:20, crit:0.20, cost:5200, special:'pierce'},
];
const WEAPON_UPGRADE_COST = lvl => Math.round(150 * Math.pow(1.65, lvl-1));
const MAX_WLVL = 5;

/* ============ STATE / SAVE ============ */
const SAVE_KEY = 'ironlegion_save_v1';
function defaultState(){
  return {
    credits: 800,
    owned: { r1:true, r2:true, r3:true, r4:true, r5:true },
    weaponLvl: { w1:1, w2:1 },
    equipped: { r1:'w1', r2:'w1', r3:'w1', r4:'w1', r5:'w1' },
    selected: 'r1',
    wins: 0, losses: 0,
  };
}
let state = load();
function load(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return defaultState();
    const s = JSON.parse(raw);
    return Object.assign(defaultState(), s);
  }catch(e){ return defaultState(); }
}
function save(){ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }

function robotById(id){ return ROBOTS.find(r=>r.id===id); }
function weaponById(id){ return WEAPONS.find(w=>w.id===id); }

function robotStats(r){
  const rar = RARITY[r.rarity], cls = CLASSES[r.class];
  const base = { hp:100, atk:14, def:8, spd:10 };
  return {
    hp:  Math.round(base.hp  * rar.mult * cls.lean.hp),
    atk: Math.round(base.atk * rar.mult * cls.lean.atk),
    def: Math.round(base.def * rar.mult * cls.lean.def),
    spd: Math.round(base.spd * rar.mult * cls.lean.spd),
  };
}
function weaponStats(w, lvl){
  return {
    atk: Math.round(w.baseAtk * (1 + 0.35*(lvl-1))),
    crit: w.crit + 0.02*(lvl-1),
  };
}

function ownedRobots(){ return ROBOTS.filter(r=>state.owned[r.id]); }
function currentRobot(){ return robotById(state.selected) || ROBOTS[0]; }
function equippedWeaponFor(robotId){
  const wid = state.equipped[robotId] || Object.keys(state.weaponLvl)[0] || 'w1';
  return { weapon: weaponById(wid), lvl: state.weaponLvl[wid]||1 };
}

/* ============ THREE.JS VIEWER ============ */
const viewerEl = document.getElementById('viewer');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a14, 0.045);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 1.6, 5.2);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
viewerEl.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 2.6;
controls.maxDistance = 8;
controls.target.set(0, 1.0, 0);
controls.maxPolarAngle = Math.PI*0.6;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.1;

// lighting — moody rim + key + fill for "realistic" metal look
const hemi = new THREE.HemisphereLight(0x8899ff, 0x0a0a10, 0.55);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(3, 5, 4);
key.castShadow = true;
key.shadow.mapSize.set(1024,1024);
scene.add(key);
const rim = new THREE.PointLight(0x7c5cff, 6, 10, 2);
rim.position.set(-3, 2.5, -3);
scene.add(rim);
const rim2 = new THREE.PointLight(0x00e5c7, 4, 10, 2);
rim2.position.set(2, 1, -2.5);
scene.add(rim2);

// ground

let robotGroup = null;
const metal = (color, rough=0.35, met=0.85) => new THREE.MeshStandardMaterial({color, roughness:rough, metalness:met});

function buildWeaponMesh(shape, color){
  const g = new THREE.Group();
  const mat = metal(0x2a2a34, 0.3, 0.9);
  const glow = new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:1.4, roughness:0.3, metalness:0.4});
  switch(shape){
    case 'blade': {
      const blade = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.7,0.18), mat);
      blade.position.y = 0.4;
      const edge = new THREE.Mesh(new THREE.BoxGeometry(0.02,0.68,0.02), glow);
      edge.position.set(0.04,0.4,0.09);
      g.add(blade, edge);
      break;
    }
    case 'pistol': {
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.14,0.16,0.4), mat);
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.035,0.35,10), mat);
      barrel.rotation.x = Math.PI/2; barrel.position.z = 0.32;
      const tip = new THREE.Mesh(new THREE.SphereGeometry(0.045,10,10), glow);
      tip.position.z = 0.5;
      g.add(body, barrel, tip);
      break;
    }
    case 'cannon': {
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.14,0.9,12), mat);
      body.rotation.x = Math.PI/2; body.position.z = 0.4;
      const ring = new THREE.Mesh(new THREE.TorusGeometry(0.13,0.02,8,16), glow);
      ring.position.z = 0.75;
      g.add(body, ring);
      break;
    }
    case 'smg': {
      for(const dx of [-0.09,0.09]){
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.09,0.12,0.42), mat);
        b.position.set(dx,0,0.15);
        g.add(b);
      }
      const tip = new THREE.Mesh(new THREE.SphereGeometry(0.03,8,8), glow);
      tip.position.set(0,0,0.4);
      g.add(tip);
      break;
    }
    case 'lance': {
      const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.05,0.95,10), mat);
      shaft.rotation.x = Math.PI/2; shaft.position.z = 0.45;
      const cone = new THREE.Mesh(new THREE.ConeGeometry(0.08,0.22,10), glow);
      cone.rotation.x = Math.PI/2; cone.position.z = 0.95;
      g.add(shaft, cone);
      break;
    }
    case 'hammer': {
      const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.035,0.55,10), mat);
      handle.position.y = 0.25;
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.18,0.22), mat);
      head.position.y = 0.55;
      const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.31,0.03,0.23), glow);
      stripe.position.y = 0.55;
      g.add(handle, head, stripe);
      break;
    }
    case 'orb': {
      const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.16,0), glow);
      const ringA = new THREE.Mesh(new THREE.TorusGeometry(0.24,0.015,8,20), mat);
      const ringB = ringA.clone(); ringB.rotation.x = Math.PI/2;
      g.add(core, ringA, ringB);
      break;
    }
    case 'greatblade': {
      const blade = new THREE.Mesh(new THREE.BoxGeometry(0.09,1.0,0.26), mat);
      blade.position.y = 0.55;
      const edge = new THREE.Mesh(new THREE.BoxGeometry(0.03,0.96,0.03), glow);
      edge.position.set(0.06,0.55,0.13);
      const guard = new THREE.Mesh(new THREE.BoxGeometry(0.24,0.06,0.1), mat);
      g.add(blade, edge, guard);
      break;
    }
  }
  return g;
}

function buildRobot(robot, weaponInfo){
  const group = new THREE.Group();
  const rar = RARITY[robot.rarity];
  const bodyColor = robot.color;
  const accent = new THREE.Color(rar.color);
  const bodyMat = metal(bodyColor, 0.32, 0.82);
  const jointMat = metal(0x1c1c22, 0.5, 0.6);
  const visorMat = new THREE.MeshStandardMaterial({color:accent, emissive:accent, emissiveIntensity:1.6, roughness:0.2, metalness:0.3});

  function limb(w,h,d,mat){ const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat); m.castShadow=true; return m; }
  function cyl(r1,r2,h,mat){ const m = new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,14), mat); m.castShadow=true; return m; }

  const cls = robot.class;
  let legHeight = 0.7, torsoY = 0;

  if(cls === 'tank'){
    // wide treads instead of legs
    const treadGeo = new THREE.BoxGeometry(0.5, 0.32, 1.05);
    const lt = new THREE.Mesh(treadGeo, jointMat); lt.position.set(-0.42,0.16,0);
    const rt = new THREE.Mesh(treadGeo, jointMat); rt.position.set(0.42,0.16,0);
    lt.castShadow = rt.castShadow = true;
    group.add(lt, rt);
    torsoY = 0.32 + 0.42;
    const torso = limb(1.05, 0.85, 0.72, bodyMat); torso.position.y = torsoY;
    group.add(torso);
    const plate = limb(1.1,0.14,0.76, jointMat); plate.position.y = torsoY+0.42;
    group.add(plate);
    legHeight = 0.32;
  } else if(cls === 'scout'){
    // hover disc base
    const disc = cyl(0.5,0.55,0.14, jointMat); disc.position.y = 0.3;
    group.add(disc);
    const glowRing = new THREE.Mesh(new THREE.TorusGeometry(0.5,0.025,8,24), visorMat);
    glowRing.position.y = 0.3; glowRing.rotation.x = Math.PI/2;
    group.add(glowRing);
    torsoY = 0.3 + 0.5;
    const torso = limb(0.62,0.6,0.4, bodyMat); torso.position.y = torsoY;
    group.add(torso);
    legHeight = 0.3;
  } else {
    // legs (assault, sniper, support)
    const legW = cls==='sniper'?0.15:0.2, legLen = cls==='sniper'?0.95:0.75;
    for(const dx of [-0.22,0.22]){
      const leg = limb(legW, legLen, legW, jointMat);
      leg.position.set(dx, legLen/2, 0);
      group.add(leg);
      const foot = limb(legW+0.08,0.1,legW+0.16, jointMat);
      foot.position.set(dx, 0.05, 0.04);
      group.add(foot);
    }
    torsoY = legLen + (cls==='sniper'?0.42:0.45);
    const torsoW = cls==='sniper'?0.58:cls==='support'?0.68:0.72;
    const torso = limb(torsoW, 0.8, cls==='sniper'?0.35:0.42, bodyMat);
    torso.position.y = torsoY;
    group.add(torso);
    legHeight = legLen;
    if(cls==='support'){
      // backpack + floating orb drone
      const pack = limb(0.4,0.5,0.2, jointMat);
      pack.position.set(0,torsoY+0.05,-0.32);
      group.add(pack);
      const orb = new THREE.Mesh(new THREE.SphereGeometry(0.14,16,16), visorMat);
      orb.position.set(0.55, torsoY+0.5, -0.15);
      group.add(orb);
      group.userData.floatOrb = orb;
    }
  }

  // shoulders + arms
  const armLen = 0.68;
  for(const side of [-1,1]){
    const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.14,12,12), jointMat);
    shoulder.position.set(side*0.42, torsoY+0.28, 0);
    group.add(shoulder);
    const arm = limb(0.16, armLen, 0.16, bodyMat);
    arm.position.set(side*0.42, torsoY+0.28-armLen/2, 0);
    group.add(arm);
    if(side===1){
      // weapon mount on right arm
      const mount = new THREE.Group();
      mount.position.set(0.42, torsoY+0.28-armLen-0.05, 0.05);
      group.add(mount);
      group.userData.weaponMount = mount;
    }
  }

  // head
  const headY = torsoY + 0.62;
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.34,0.3,0.32), bodyMat);
  head.position.y = headY;
  head.castShadow = true;
  group.add(head);
  const visor = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.08,0.02), visorMat);
  visor.position.set(0, headY+0.02, 0.16);
  group.add(visor);
  if(cls==='sniper'){
    const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.22,10), jointMat);
    scope.rotation.z = Math.PI/2;
    scope.position.set(0.2, headY+0.16, 0);
    group.add(scope);
  }
  const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.22,6), jointMat);
  antenna.position.set(0.1, headY+0.24, -0.05);
  group.add(antenna);
  const antTip = new THREE.Mesh(new THREE.SphereGeometry(0.025,8,8), visorMat);
  antTip.position.set(0.1, headY+0.35, -0.05);
  group.add(antTip);

  // rarity aura ring on ground for epic/legendary
  if(robot.rarity==='epic' || robot.rarity==='legendary'){
    const aura = new THREE.Mesh(new THREE.RingGeometry(0.85,0.95,48), new THREE.MeshBasicMaterial({color:accent, transparent:true, opacity:0.55, side:THREE.DoubleSide}));
    aura.rotation.x = -Math.PI/2;
    aura.position.y = 0.02;
    group.add(aura);
    group.userData.aura = aura;
  }

  // weapon attach
  if(group.userData.weaponMount && weaponInfo){
    const wmesh = buildWeaponMesh(weaponInfo.weapon.shape, accent);
    wmesh.rotation.x = -Math.PI/2.3;
    group.userData.weaponMount.add(wmesh);
  }

  group.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; }});
  return group;
}

let clock = new THREE.Clock();
let lastFlash = 0;
function setRobotInViewer(robot, weaponInfo){
  if(robotGroup){ scene.remove(robotGroup); }
  robotGroup = buildRobot(robot, weaponInfo);
  robotGroup.position.y = 0;
  scene.add(robotGroup);
  camera.position.set(0, 1.5, robot.class==='tank'?6:5.2);
}
function flashHit(){ lastFlash = clock.getElapsedTime(); }

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  if(robotGroup){
    robotGroup.position.y = Math.sin(t*1.2)*0.03;
    if(robotGroup.userData.floatOrb){
      robotGroup.userData.floatOrb.position.y += Math.sin(t*2)*0.0015;
    }
    if(robotGroup.userData.aura){
      robotGroup.userData.aura.rotation.z = t*0.5;
    }
    if(t - lastFlash < 0.15){
      robotGroup.traverse(o=>{ if(o.isMesh && o.material && o.material.emissiveIntensity!==undefined){ /* pulse handled via scale */ }});
      robotGroup.scale.setScalar(1.03);
    } else {
      robotGroup.scale.setScalar(1);
    }
  }
  rim.intensity = 5.5 + Math.sin(t*2)*0.8;
  controls.update();
  renderer.render(scene, camera);
}
resizeViewer();
animate();

const toastEl = document.getElementById('toast');
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toastEl.classList.remove('show'), 1800);
}

function fmt(n){ return n.toLocaleString(); }

function renderTopbar(){
  document.getElementById('credits').textContent = fmt(state.credits);
  document.getElementById('winrate').textContent = `${state.wins}W ${state.losses}L`;
}

function renderHangar(){
  const r = currentRobot();
  const rar = RARITY[r.rarity];
  const st = robotStats(r);
  const badge = document.getElementById('rarityBadge');
  badge.textContent = rar.label.toUpperCase();
  badge.style.background = rar.color+'26';
  badge.style.color = rar.color;
  badge.style.border = '1px solid '+rar.color+'55';
  document.getElementById('robotName').textContent = r.name;
  document.getElementById('robotClass').textContent = CLASSES[r.class].label+' Class';

  const wInfo = equippedWeaponFor(r.id);
  const wstat = weaponStats(wInfo.weapon, wInfo.lvl);
  const totalAtk = st.atk + wstat.atk;

  const rows = [
    ['HP', st.hp, 260, '#ff4d5e'],
    ['ATK', totalAtk, 60, '#ff8a3d'],
    ['DEF', st.def, 40, '#3ea8ff'],
    ['SPD', st.spd, 30, '#3ecf6e'],
  ];
  document.getElementById('hangarStats').innerHTML = rows.map(([label,val,max,color])=>`
    <div class="statrow">
      <span class="label">${label}</span>
      <span class="bar"><i style="width:${Math.min(100, val/max*100)}%;background:${color}"></i></span>
      <span class="val">${val}</span>
    </div>`).join('') + `
    <div class="statrow" style="margin-top:2px">
      <span class="label">⚔</span>
      <span style="flex:1;color:#fff;font-weight:700">${wInfo.weapon.name} <span class="lvltag">Lv${wInfo.lvl}</span></span>
      <span style="color:var(--mute);font-size:11px">${ABILITIES.find(a=>a.id===r.ability).name}</span>
    </div>`;

  setRobotInViewer(r, wInfo);
}

function renderCollection(){
  const grid = document.getElementById('collectionGrid');
  grid.innerHTML = ROBOTS.map(r=>{
    const owned = !!state.owned[r.id];
    const rar = RARITY[r.rarity];
    const sel = state.selected === r.id;
    return `<div class="rcard ${owned?'':'locked'} ${sel?'selected':''}" data-id="${r.id}" data-owned="${owned}">
      <div class="swatch" style="background:linear-gradient(160deg, ${rar.color}33, #0000 70%); border:1px solid ${rar.color}55">
        ${owned ? '🤖' : '🔒'}
      </div>
      <div class="nm">${r.name}</div>
      <div class="rr" style="color:${rar.color}">${rar.label}</div>
    </div>`;
  }).join('');
}

function renderWeapons(){
  const list = document.getElementById('weaponList');
  const cur = currentRobot();
  list.innerHTML = WEAPONS.map(w=>{
    const owned = !!state.weaponLvl[w.id];
    const lvl = state.weaponLvl[w.id] || 0;
    const stat = owned ? weaponStats(w, lvl) : weaponStats(w,1);
    const isEquipped = state.equipped[cur.id] === w.id;
    const upCost = WEAPON_UPGRADE_COST(lvl||1);
    let actionsHtml = '';
    if(!owned){
      actionsHtml = `<button class="btn secondary" data-buy="${w.id}">Unlock ◆${fmt(w.cost)}</button>`;
    } else {
      actionsHtml = `
        <button class="btn ${isEquipped?'equipped':'secondary'}" data-equip="${w.id}">${isEquipped?'Equipped':'Equip'}</button>
        ${lvl<MAX_WLVL ? `<button class="btn secondary" data-upgrade="${w.id}">Upgrade ◆${fmt(upCost)}</button>` : `<span class="lvltag">MAX</span>`}
      `;
    }
    return `<div class="witem">
      <div class="wicon">${w.ic}</div>
      <div class="wbody">
        <div class="wname">${w.name} ${owned?`<span class="lvltag">Lv${lvl}</span>`:''}</div>
        <div class="wmeta">ATK ${stat.atk} · Crit ${Math.round(stat.crit*100)}%${w.special?` · ${w.special}`:''}</div>
      </div>
      <div class="wactions">${actionsHtml}</div>
    </div>`;
  }).join('');
}

function switchPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  if(name==='hangar'){
    document.querySelector('[data-panel="hangar"]').classList.add('active');
    renderHangar();
    return;
  }
  const panel = document.getElementById('panel-'+name);
  if(panel) panel.classList.add('open');
  const btn = document.querySelector(`[data-panel="${name}"]`);
  if(btn) btn.classList.add('active');
  if(name==='collection') renderCollection();
  if(name==='weapons') renderWeapons();
  if(name==='battle') prepBattle();
}

document.querySelectorAll('.navbtn').forEach(b=>{
  b.addEventListener('click', ()=> switchPanel(b.dataset.panel));
});
document.querySelectorAll('[data-close]').forEach(b=>{
  b.addEventListener('click', ()=> switchPanel('hangar'));
});

document.getElementById('collectionGrid').addEventListener('click', e=>{
  const card = e.target.closest('.rcard');
  if(!card) return;
  const id = card.dataset.id;
  if(card.dataset.owned === 'true'){
    state.selected = id;
    if(!state.equipped[id]) state.equipped[id] = Object.keys(state.weaponLvl)[0]||'w1';
    save();
    renderCollection();
    switchPanel('hangar');
  } else {
    const r = robotById(id);
    const cost = RARITY[r.rarity].cost;
    if(state.credits < cost){ toast(`Need ◆${fmt(cost)} to unlock ${r.name}`); return; }
    if(confirm(`Unlock ${r.name} (${RARITY[r.rarity].label}) for ◆${fmt(cost)}?`)){
      state.credits -= cost;
      state.owned[id] = true;
      state.equipped[id] = 'w1';
      save(); renderTopbar(); renderCollection();
      toast(`${r.name} unlocked!`);
    }
  }
});

document.getElementById('recruitBtn').addEventListener('click', ()=>{
  const cost = 350;
  if(state.credits < cost){ toast('Not enough credits'); return; }
  const locked = ROBOTS.filter(r=>!state.owned[r.id]);
  if(locked.length===0){ toast('All robots already recruited!'); return; }
  state.credits -= cost;
  // weighted random by rarity among locked
  const pool = [];
  locked.forEach(r=>{ for(let i=0;i<RARITY_WEIGHTS[r.rarity];i++) pool.push(r); });
  const pick = pool[Math.floor(Math.random()*pool.length)];
  state.owned[pick.id] = true;
  state.equipped[pick.id] = 'w1';
  save(); renderTopbar(); renderCollection();
  toast(`Recruited ${pick.name}! (${RARITY[pick.rarity].label})`);
});

document.getElementById('weaponList').addEventListener('click', e=>{
  const cur = currentRobot();
  const buy = e.target.closest('[data-buy]');
  const equip = e.target.closest('[data-equip]');
  const upgrade = e.target.closest('[data-upgrade]');
  if(buy){
    const w = weaponById(buy.dataset.buy);
    if(state.credits < w.cost){ toast(`Need ◆${fmt(w.cost)}`); return; }
    state.credits -= w.cost;
    state.weaponLvl[w.id] = 1;
    save(); renderTopbar(); renderWeapons();
    toast(`${w.name} unlocked`);
  } else if(equip){
    state.equipped[cur.id] = equip.dataset.equip;
    save(); renderWeapons();
    toast(`Equipped on ${cur.name}`);
  } else if(upgrade){
    const wid = upgrade.dataset.upgrade;
    const lvl = state.weaponLvl[wid]||1;
    const cost = WEAPON_UPGRADE_COST(lvl);
    if(state.credits < cost){ toast(`Need ◆${fmt(cost)}`); return; }
    if(lvl>=MAX_WLVL) return;
    state.credits -= cost;
    state.weaponLvl[wid] = lvl+1;
    save(); renderTopbar(); renderWeapons();
    toast(`${weaponById(wid).name} upgraded to Lv${lvl+1}`);
  }
});

/* ============ BATTLE SYSTEM ============ */
let battle = null;

function makeEnemy(){
  const ownedList = ownedRobots();
  const avgPower = ownedList.reduce((s,r)=>{
    const st = robotStats(r); return s + st.hp*0.25+st.atk*2+st.def*1.5+st.spd;
  },0) / Math.max(1,ownedList.length);
  // pick random archetype scaled near avg power
  const rarityRoll = Math.random();
  const rarity = rarityRoll<0.35?'common':rarityRoll<0.6?'uncommon':rarityRoll<0.8?'rare':rarityRoll<0.94?'epic':'legendary';
  const cls = Object.keys(CLASSES)[Math.floor(Math.random()*5)];
  const names = ['Hostile Drone','Rogue Unit','Feral Bot','Enemy Sentinel','Corrupted Frame','Wild Automaton'];
  const enemy = {
    id:'enemy', name: names[Math.floor(Math.random()*names.length)],
    class:cls, rarity, ability: ABILITIES[Math.floor(Math.random()*ABILITIES.length)].id,
    color: 0x5a2a2a,
  };
  const st = robotStats(enemy);
  // scale toward player's average power a bit
  const scale = 0.85 + Math.random()*0.3;
  const stats = { hp:Math.round(st.hp*scale), atk:Math.round(st.atk*scale), def:Math.round(st.def*scale), spd:Math.round(st.spd*scale) };
  return { def:enemy, stats, weapon: WEAPONS[Math.floor(Math.random()*4)], wlvl: 1+Math.floor(Math.random()*3) };
}

function prepBattle(){
  const r = currentRobot();
  const st = robotStats(r);
  const wInfo = equippedWeaponFor(r.id);
  const wstat = weaponStats(wInfo.weapon, wInfo.lvl);
  const enemy = makeEnemy();
  const ewstat = weaponStats(enemy.weapon, enemy.wlvl);

  battle = {
    p: { robot:r, stats:st, weapon:wInfo.weapon, wstat, hp:st.hp, maxHp:st.hp, cd:0, buffAtk:0, shield:0, ability: ABILITIES.find(a=>a.id===r.ability) },
    e: { robot:enemy.def, stats:enemy.stats, weapon:enemy.weapon, wstat:ewstat, hp:enemy.stats.hp, maxHp:enemy.stats.hp, cd:0, buffAtk:0, shield:0, stunned:false, ability: ABILITIES.find(a=>a.id===enemy.def.ability) },
    log: [], over:false,
  };

  document.getElementById('pName').textContent = r.name;
  document.getElementById('pClass').textContent = CLASSES[r.class].label;
  document.getElementById('eName').textContent = enemy.def.name;
  document.getElementById('eClass').textContent = CLASSES[enemy.def.class].label+' · '+RARITY[enemy.def.rarity].label;
  document.getElementById('eFighter').style.borderColor = RARITY[enemy.def.rarity].color+'66';
  document.getElementById('abilityLbl').textContent = battle.p.ability.name;
  document.getElementById('battleLog').innerHTML = '';
  logMsg(`Battle start: ${r.name} vs ${enemy.def.name}!`, 'sys');
  document.getElementById('resultOverlay').classList.remove('show');
  updateHpBars();
  setBattleButtonsEnabled(true);
}

function logMsg(text, cls){
  const el = document.getElementById('battleLog');
  const line = document.createElement('div');
  line.className = cls||'';
  line.textContent = text;
  el.prepend(line);
}

function updateHpBars(){
  const p = battle.p, e = battle.e;
  document.getElementById('pHpBar').style.width = Math.max(0,p.hp/p.maxHp*100)+'%';
  document.getElementById('eHpBar').style.width = Math.max(0,e.hp/e.maxHp*100)+'%';
  document.getElementById('abilityCd').textContent = p.cd>0 ? `CD ${p.cd}` : 'Ready';
  document.getElementById('actAbility').disabled = p.cd>0;
}

function setBattleButtonsEnabled(on){
  document.getElementById('actAttack').disabled = !on;
  document.getElementById('actAbility').disabled = !on || battle.p.cd>0;
  document.getElementById('actDefend').disabled = !on;
}

function computeDamage(attacker, defender){
  let atk = attacker.stats.atk + attacker.wstat.atk;
  if(attacker.buffAtk>0) atk *= 1.6;
  let def = defender.stats.def;
  if(defender.shield>0) def *= 3.2; // heavy mitigation while shielded
  let dmg = Math.max(2, Math.round(atk - def*0.55 + (Math.random()*6-3)));
  const isCrit = Math.random() < attacker.wstat.crit;
  if(isCrit) dmg = Math.round(dmg*1.75);
  if(attacker.weapon.special==='pierce') dmg = Math.round(dmg*1.1);
  return {dmg, isCrit};
}

function enemyTurn(){
  const p = battle.p, e = battle.e;
  if(e.hp<=0 || p.hp<=0) return;
  if(e.stunned){ e.stunned=false; logMsg(`${e.robot.name} is stunned and skips its turn!`,'sys'); return; }
  // simple AI: use ability if off cd and hp<50%, else attack
  if(e.cd<=0 && Math.random()<0.4){
    applyAbility(e, p, false);
  } else {
    const {dmg,isCrit} = computeDamage(e,p);
    p.hp = Math.max(0, p.hp-dmg);
    logMsg(`${e.robot.name} attacks for ${dmg}${isCrit?' (CRIT!)':''}`, 'en');
  }
  if(e.cd>0) e.cd--;
  e.shield = Math.max(0, e.shield-1);
  e.buffAtk = Math.max(0, e.buffAtk-1);
}

function applyAbility(user, target, isPlayer){
  const ab = user.ability;
  const name = user.robot.name;
  switch(ab.id){
    case 'overcharge': user.buffAtk = 2; logMsg(`${name} uses Overcharge — attack surges!`, isPlayer?'me':'en'); break;
    case 'aegis': user.shield = 1; logMsg(`${name} raises Aegis Shield!`, isPlayer?'me':'en'); break;
    case 'nanoheal': {
      const heal = Math.round(user.maxHp*0.25);
      user.hp = Math.min(user.maxHp, user.hp+heal);
      logMsg(`${name} activates Nano Repair, +${heal} HP!`, isPlayer?'me':'en');
      break;
    }
    case 'emp': target.stunned = true; logMsg(`${name} unleashes an EMP Burst — enemy stunned!`, isPlayer?'me':'en'); break;
    case 'focus': {
      const {dmg} = computeDamage(user,target);
      const boosted = Math.round(dmg*1.75);
      target.hp = Math.max(0, target.hp-boosted);
      logMsg(`${name} lands a guaranteed Focus Fire critical for ${boosted}!`, isPlayer?'me':'en');
      flashHit();
      break;
    }
    case 'siphon': {
      const {dmg} = computeDamage(user,target);
      target.hp = Math.max(0, target.hp-dmg);
      const drain = Math.round(dmg*0.4);
      user.hp = Math.min(user.maxHp, user.hp+drain);
      logMsg(`${name} siphons ${dmg} dmg, healing ${drain} HP!`, isPlayer?'me':'en');
      flashHit();
      break;
    }
  }
  user.cd = ab.cd;
}

function endCheck(){
  const p = battle.p, e = battle.e;
  if(p.hp<=0 || e.hp<=0){
    battle.over = true;
    setBattleButtonsEnabled(false);
    const win = e.hp<=0 && p.hp>0;
    const overlay = document.getElementById('resultOverlay');
    overlay.classList.add('show');
    overlay.classList.toggle('win', win);
    overlay.classList.toggle('lose', !win);
    document.getElementById('resultTitle').textContent = win ? 'VICTORY' : 'DEFEAT';
    if(win){
      const reward = 90 + Math.round(RARITY[e.robot.rarity].mult*80) + Math.round(Math.random()*40);
      state.credits += reward;
      state.wins++;
      document.getElementById('resultDesc').textContent = `You earned ◆${fmt(reward)}`;
      toast(`Victory! +◆${reward}`);
    } else {
      state.losses++;
      const consolation = 25;
      state.credits += consolation;
      document.getElementById('resultDesc').textContent = `${e.robot.name} won. +◆${consolation} consolation`;
    }
    save(); renderTopbar();
    return true;
  }
  return false;
}

document.getElementById('actAttack').addEventListener('click', ()=>{
  if(!battle || battle.over) return;
  const p = battle.p, e = battle.e;
  const {dmg, isCrit} = computeDamage(p,e);
  e.hp = Math.max(0, e.hp-dmg);
  logMsg(`${p.robot.name} attacks for ${dmg}${isCrit?' (CRIT!)':''}`, 'me');
  flashHit();
  p.shield = Math.max(0,p.shield-1);
  p.buffAtk = Math.max(0,p.buffAtk-1);
  if(p.cd>0) p.cd--;
  updateHpBars();
  if(endCheck()) return;
  setTimeout(()=>{ enemyTurn(); updateHpBars(); endCheck(); }, 450);
});

document.getElementById('actAbility').addEventListener('click', ()=>{
  if(!battle || battle.over || battle.p.cd>0) return;
  applyAbility(battle.p, battle.e, true);
  updateHpBars();
  if(endCheck()) return;
  setTimeout(()=>{ enemyTurn(); updateHpBars(); endCheck(); }, 450);
});

document.getElementById('actDefend').addEventListener('click', ()=>{
  if(!battle || battle.over) return;
  battle.p.shield = 2;
  logMsg(`${battle.p.robot.name} braces defensively.`, 'me');
  if(battle.p.cd>0) battle.p.cd--;
  updateHpBars();
  setTimeout(()=>{ enemyTurn(); updateHpBars(); endCheck(); }, 450);
});

document.getElementById('resultClose').addEventListener('click', ()=>{
  document.getElementById('resultOverlay').classList.remove('show');
  prepBattle();
});

/* ============ INIT ============ */
renderTopbar();
switchPanel('hangar');
</script>
</body>
</html>
